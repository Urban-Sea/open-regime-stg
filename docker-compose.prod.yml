services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.prod.conf.template:/etc/nginx/conf.d/default.prod.conf.template:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/log/open-regime/nginx:/var/log/nginx
    environment:
      - PROXY_SECRET=${PROXY_SECRET}
    command: >
      /bin/sh -c "envsubst '$$PROXY_SECRET' < /etc/nginx/conf.d/default.prod.conf.template
      > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-python:
        condition: service_started
      api-go:
        condition: service_started
      frontend:
        condition: service_started
    mem_limit: 32m
    cpus: 0.25
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- PostgreSQL (tuned for 1GB VPS) ---
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=30
      - -c
      - wal_buffers=4MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_wal_size=256MB
      - -c
      - min_wal_size=64MB
      - -c
      - huge_pages=off
    environment:
      - POSTGRES_DB=open_regime
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d open_regime"]
      interval: 30s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Redis ---
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "48mb", "--maxmemory-policy", "allkeys-lru", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    mem_limit: 64m
    cpus: 0.25
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # --- Python Compute API (signal, regime, exit, stock) ---
  api-python:
    image: open-regime-api-python:latest
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=open_regime
      - DB_USER=app
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - PROXY_SECRET=${PROXY_SECRET}
      - ENVIRONMENT=production
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - /var/log/open-regime/api-python:/var/log/open-regime/api-python
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Go CRUD API (auth, CRUD, Stripe) ---
  api-go:
    image: open-regime-api-go:latest
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=open_regime
      - DB_USER=app
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=https://open-regime.com/api/auth/google/callback
      - FRONTEND_URL=https://open-regime.com
      - COOKIE_DOMAIN=.open-regime.com
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - WARMUP_TOKEN=${WARMUP_TOKEN:-}
      - PUBLISH_TOKEN=${PUBLISH_TOKEN:-}
      - ENVIRONMENT=production
    volumes:
      - /var/log/open-regime/api-go:/var/log/open-regime/api-go
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 64m
    cpus: 0.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Frontend (Next.js SSR) ---
  frontend:
    image: open-regime-frontend:latest
    environment:
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_GA_ID=${GA_ID:-}
    depends_on:
      api-python:
        condition: service_started
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Admin Frontend (Next.js SSR) ---
  admin-frontend:
    image: open-regime-admin:latest
    environment:
      - PORT=3002
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      api-python:
        condition: service_started
      api-go:
        condition: service_started
    mem_limit: 96m
    cpus: 0.5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Batch (on-demand via docker compose run) ---
  batch:
    image: open-regime-batch:latest
    profiles: [tools]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=open_regime
      - DB_USER=app
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - FRED_API_KEY=${FRED_API_KEY}
      - ENVIRONMENT=production
      - R2_BUCKET=${R2_BUCKET:-open-regime-backup}
      - PGPASSWORD=${DB_PASSWORD}
      # Cache warmup: batch から ?purge=1 で api-go の cache を強制リフレッシュする際の認証ヘッダ
      - WARMUP_TOKEN=${WARMUP_TOKEN:-}
      - WARMUP_BACKEND_URL=${WARMUP_BACKEND_URL:-https://open-regime.com}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - /var/log/open-regime/batch:/var/log/open-regime/batch
      - /opt/open-regime/backup:/backup
      - /opt/open-regime/rclone.conf:/etc/rclone/rclone.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pg_data:
  redis_data:
