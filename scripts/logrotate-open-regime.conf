# /etc/logrotate.d/open-regime
#
# 注意: api-go (lumberjack) と api-python/batch (RotatingFileHandler) は
# 自前ローテーションするため、ここから除外。二重ローテはログ欠損の原因。
# 対象は自己ローテしない 3 種類のみ:
#   - nginx の access.log / error.log (USR1 シグナルで再オープン)
#   - batch の cron.log / backup.log  (cron リダイレクト)

/var/log/open-regime/nginx/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    sharedscripts
    postrotate
        docker kill --signal=USR1 open-regime-nginx-1 2>/dev/null || true
    endscript
}

/var/log/open-regime/batch/cron.log
/var/log/open-regime/batch/backup.log
{
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
