# Open Regime - nginx configuration
# Step 1: minimal config (health check only)
# Upstreams will be enabled as services come online in later steps.

# --- Upstreams (uncomment as services are added) ---

upstream frontend {
    server frontend:3000;
}
upstream admin_frontend {
    server admin-frontend:3002;
}
upstream api_go {
    server api-go:8080;
}
upstream api_python {
    server api-python:8081;
}

# --- Main site: open-regime.com ---

server {
    listen 80;
    server_name localhost open-regime.com;

    # Health check (always available)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # --- Step 2: Python compute API ---
    location ~ ^/api/(signal|regime|exit|stock)(/|$) {
        proxy_pass http://api_python;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Step 3: Go CRUD API ---
    location /api/ {
        proxy_pass http://api_go;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Admin: access directly at localhost:3002 (no longer proxied via /admin/)

    # --- Step 5: Frontend ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
