services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-python:
        condition: service_started
      api-go:
        condition: service_started
      frontend:
        condition: service_started
    mem_limit: 64m
    cpus: 0.25
    restart: unless-stopped

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=open_regime
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d open_regime"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped

  # --- Python Compute API (signal, regime, exit, stock) ---
  api-python:
    build: ./app/backend
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8081", "--log-config", "/app/log_config_stdout.json"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=open_regime
      - DB_USER=app
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=development
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  # --- Go CRUD API (auth, CRUD, Stripe) ---
  api-go:
    build: ./api-go
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=open_regime
      - DB_USER=app
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=http://localhost/api/auth/google/callback
      - FRONTEND_URL=http://localhost
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  # --- Frontend (Next.js SSR) ---
  frontend:
    build: ./app/frontend
    environment:
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_GA_ID=${GA_ID:-}
    depends_on:
      api-python:
        condition: service_started
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  # --- Admin Frontend (Next.js SSR) ---
  admin-frontend:
    build: ./app/admin-frontend
    environment:
      - PORT=3002
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      api-python:
        condition: service_started
      api-go:
        condition: service_started
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  # --- Batch (on-demand via docker compose run) ---
  batch:
    build:
      context: .
      dockerfile: app/batch/Dockerfile
    profiles: [tools]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=open_regime
      - DB_USER=app
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - FRED_API_KEY=${FRED_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
